name: Wayback Machine Contact Harvester

on:
  workflow_dispatch:
    inputs:
      total_domains:
        description: "Total domains to harvest"
        required: false
        default: "5000"
      shards:
        description: "Number of parallel workers"
        required: false
        default: "10"
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  prep:
    name: Fetch domains from VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      domain_count: ${{ steps.fetch.outputs.count }}

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Fetch domain list with SONA retry
        id: fetch
        env:
          VPS_PASS: ${{ secrets.VPS_PASS }}
        run: |
          LIMIT=${{ github.event.inputs.total_domains || '5000' }}
          SHARDS=${{ github.event.inputs.shards || '10' }}
          mkdir -p data

          # SONA-style retry with backoff
          DELAY=5
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Attempt $attempt (delay=${DELAY}s)..."
            if sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              root@147.93.113.37 \
              "sqlite3 /opt/cangraph/canada_b2b.db \"SELECT domain FROM businesses WHERE domain IS NOT NULL AND domain != '' AND domain LIKE '%.ca' AND length(domain) > 4 ORDER BY RANDOM() LIMIT $LIMIT;\"" \
              > data/domains.txt 2>/dev/null; then
              echo "SSH succeeded on attempt $attempt"
              break
            fi
            echo "SSH failed, backing off ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))  # Exponential backoff
          done

          COUNT=$(wc -l < data/domains.txt)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Fetched $COUNT domains"

          # Split into shards
          SHARD_SIZE=$(( (COUNT + SHARDS - 1) / SHARDS ))
          split -l $SHARD_SIZE -d -a 2 data/domains.txt data/shard_
          ls -la data/shard_* || echo "No shards created"

      - name: Upload shards
        uses: actions/upload-artifact@v4
        with:
          name: domain-shards
          path: data/shard_*
          retention-days: 1

  harvest:
    name: "Wayback ${{ matrix.shard }}"
    needs: prep
    if: needs.prep.outputs.domain_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 55

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        shard: ["00", "01", "02", "03", "04", "05", "06", "07", "08", "09"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Download shard
        uses: actions/download-artifact@v4
        with:
          name: domain-shards
          path: data

      - name: Check shard exists
        id: check
        run: |
          SHARD="data/shard_${{ matrix.shard }}"
          if [ -f "$SHARD" ] && [ -s "$SHARD" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Shard has $(wc -l < $SHARD) domains"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No shard for ${{ matrix.shard }}"
          fi

      - name: Create harvest DB
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 << 'PY'
          import sqlite3
          conn = sqlite3.connect("data/harvest.db")
          conn.execute("""CREATE TABLE businesses (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            name TEXT, domain TEXT, email TEXT, phone TEXT, confidence INTEGER DEFAULT 0
          )""")
          conn.execute("""CREATE TABLE IF NOT EXISTS wayback_contacts (
            id INTEGER PRIMARY KEY, business_id INTEGER, domain TEXT,
            email TEXT, phone TEXT, snapshot_url TEXT, snapshot_date TEXT,
            extracted_at TEXT DEFAULT (datetime('now'))
          )""")
          with open("data/shard_${{ matrix.shard }}") as f:
            for line in f:
              d = line.strip()
              if d:
                conn.execute("INSERT INTO businesses (domain) VALUES (?)", (d,))
          conn.commit()
          print(f"DB ready: {conn.execute('SELECT COUNT(*) FROM businesses').fetchone()[0]} domains")
          conn.close()
          PY

      - name: Run harvester (SONA-fast)
        if: steps.check.outputs.skip == 'false'
        env:
          CANGRAPH_DIR: "."
        run: |
          mkdir -p data logs
          python3 scripts/wayback_harvest.py \
            --db data/harvest.db \
            --limit 999999 \
            --workers 8 \
            --rate 12 \
            --max-snapshots 1
        timeout-minutes: 40

      - name: Export results
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 << 'PY'
          import sqlite3, json
          conn = sqlite3.connect("data/harvest.db")
          rows = conn.execute("SELECT domain, email, phone, extracted_at FROM wayback_contacts").fetchall()
          with open("data/results_${{ matrix.shard }}.jsonl", "w") as f:
            for r in rows:
              f.write(json.dumps({"domain": r[0], "email": r[1], "phone": r[2], "ts": r[3]}) + "\n")
          print(f"Exported {len(rows)} contacts")
          conn.close()
          PY

      - name: Upload results
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: wayback-${{ matrix.shard }}
          path: data/results_*.jsonl
          retention-days: 30

  merge:
    name: Merge & push to VPS
    needs: harvest
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: "wayback-*"
          merge-multiple: true

      - name: Merge
        run: |
          cat results/*.jsonl > data/wayback_merged.jsonl 2>/dev/null || true
          if [ -f data/wayback_merged.jsonl ]; then
            echo "Total contacts: $(wc -l < data/wayback_merged.jsonl)"
          else
            echo "No results"
          fi

      - name: Push to VPS with SONA retry
        env:
          VPS_PASS: ${{ secrets.VPS_PASS }}
        run: |
          if [ ! -f data/wayback_merged.jsonl ] || [ ! -s data/wayback_merged.jsonl ]; then
            echo "Nothing to push"
            exit 0
          fi
          sudo apt-get install -y sshpass

          DELAY=5
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Push attempt $attempt..."
            if sshpass -p "$VPS_PASS" scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              data/wayback_merged.jsonl root@147.93.113.37:/opt/cangraph/data/ && \
              sshpass -p "$VPS_PASS" scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              scripts/import_wayback.py root@147.93.113.37:/opt/cangraph/data/ && \
              sshpass -p "$VPS_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              root@147.93.113.37 "python3 /opt/cangraph/data/import_wayback.py /opt/cangraph/canada_b2b.db /opt/cangraph/data/wayback_merged.jsonl"; then
              echo "Push succeeded"
              break
            fi
            echo "Failed, backing off ${DELAY}s"
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

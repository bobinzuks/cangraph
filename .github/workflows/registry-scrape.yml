name: Canadian Registry Scrape (SONA-Adaptive)

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Registry to scrape (bc, federal, ontario, all)"
        required: true
        default: "all"
        type: choice
        options:
          - bc
          - federal
          - ontario
          - all
      max_per_registry:
        description: "Max requests per registry per runner"
        required: false
        default: "100"
  schedule:
    # Daily at 03:00 UTC (off-peak for Canadian registries)
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  scrape:
    name: "Scrape ${{ matrix.registry }} / ${{ matrix.keyword_batch }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 20 # 20 concurrent runners = 20 unique IPs
      matrix:
        registry:
          - bc
          - federal
          - ontario
        keyword_batch:
          - "restaurant,bar,cafe,pizza,catering"
          - "dental,medical,clinic,pharmacy,veterinary"
          - "real estate,law firm,accounting,consulting,financial"
          - "salon,spa,fitness,gym,massage"
          - "auto,mechanic,towing,car wash,tire"
          - "construction,plumbing,electric,hvac,roofing"
          - "painting,landscaping,cleaning,moving,pest control"
          - "daycare,school,tutoring,training,education"
          - "hotel,motel,inn,lodge,resort"
          - "insurance,mortgage,investment,tax,bookkeeping"
          - "photography,printing,signage,design,marketing"
          - "plumbing,electric,hvac,roofing,flooring"
          - "carpentry,welding,masonry,glazing,insulation"
          - "snow removal,tree service,irrigation,concrete,paving"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Load previous SONA state (if exists)
        run: |
          mkdir -p data
          if [ -f "data/sona_rates.json" ]; then
            echo "Loaded previous rate state"
            cat data/sona_rates.json
          else
            echo "Starting with default rates"
          fi

      - name: Run SONA scraper
        env:
          RUNNER_ID: ${{ matrix.registry }}-${{ strategy.job-index }}
        run: |
          python scripts/registry_sona.py \
            --registry "${{ matrix.registry }}" \
            --keywords "${{ matrix.keyword_batch }}" \
            --max-per-registry ${{ github.event.inputs.max_per_registry || '100' }} \
            --output "data/results_${{ matrix.registry }}_${{ strategy.job-index }}.jsonl" \
            --runner-id "${RUNNER_ID}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.registry }}-${{ strategy.job-index }}
          path: |
            data/results_*.jsonl
            data/sona_rates.json
          retention-days: 14

  aggregate:
    name: Merge results + commit SONA state
    needs: scrape
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          pattern: "results-*"
          merge-multiple: true

      - name: Merge results + aggregate SONA state
        run: |
          mkdir -p data/registry
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M")
          MERGED="data/registry/scrape_${TIMESTAMP}.jsonl"

          # Merge all results
          if ls downloaded/results_*.jsonl 1>/dev/null 2>&1; then
            cat downloaded/results_*.jsonl > "${MERGED}"
            COUNT=$(wc -l < "${MERGED}")
            echo "Merged ${COUNT} results into ${MERGED}"
          fi

          # Average the SONA state from all runners (winning strategy)
          python3 <<'PY'
          import json, glob, pathlib
          states = []
          for f in glob.glob("downloaded/sona_rates.json"):
              try:
                  states.append(json.loads(pathlib.Path(f).read_text()))
              except: pass
          if not states: exit()

          # Average delays, take max backoff, sum successes/failures
          avg = {}
          keys = states[0].keys()
          for k in keys:
              delays = [s[k]["delay"] for s in states]
              backoffs = [s[k]["backoff"] for s in states]
              avg[k] = {
                  "delay": round(sum(delays) / len(delays), 2),
                  "backoff": round(max(backoffs), 2),
                  "successes": sum(s[k]["successes"] for s in states),
                  "failures": sum(s[k]["failures"] for s in states),
              }
          pathlib.Path("data/sona_rates.json").write_text(json.dumps(avg, indent=2))
          print("Updated SONA state:", json.dumps(avg, indent=2))
          PY

      - name: Commit results + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/registry/ data/sona_rates.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "registry: SONA-adaptive scrape [${TIMESTAMP}]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push && break
            sleep $((i * 3))
          done
